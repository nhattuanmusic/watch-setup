<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>ESP32 Watch Control</title>

<style>

body{

 font-family:Arial;

 background:#0f141a;

 color:white;

 text-align:center;

 padding:30px;

}

button{

 font-size:18px;

 padding:12px;

 margin:6px;

 width:160px;

 background:#1e88e5;

 color:white;

 border:none;

 border-radius:10px;

}

input{

 font-size:18px;

 padding:12px;

 margin:6px;

 width:260px;

 border-radius:8px;

 border:none;

}

.card{

 background:#1c232b;

 padding:20px;

 border-radius:12px;

 margin:20px;

}

</style>

</head>

<body>

<h2>ESP32 Watch Control</h2>

<button onclick="initBLE()">Connect Watch</button>

<p id="status">Disconnected</p>

<div class="card">

<h3>Quick Actions</h3>

<button onclick="sendCmd('FACE HOME')">Home</button>

<button onclick="sendCmd('FACE NOTE')">Notes</button>

<button onclick="sendCmd('FACE WEATHER')">Weather</button>

<button onclick="sendCmd('STATUS')">Status</button>

</div>

<div class="card">

<h3>Send Note</h3>

<input id="noteText" placeholder="Type note">

<br>

<button onclick="sendNote()">Send Note</button>

</div>

<script>

const SERVICE_UUID =
"6e400001-b5a3-f393-e0a9-e50e24dcca9e";

const RX_UUID =
"6e400002-b5a3-f393-e0a9-e50e24dcca9e";

const TX_UUID =
"6e400003-b5a3-f393-e0a9-e50e24dcca9e";

let rxChar;
let txChar;

async function initBLE(){

 try{

  const device =
  await navigator.bluetooth.requestDevice({

   acceptAllDevices:true,

   optionalServices:[SERVICE_UUID]

  });

  const server =
  await device.gatt.connect();

  const service =
  await server.getPrimaryService(
   SERVICE_UUID
  );

  rxChar =
  await service.getCharacteristic(
   RX_UUID
  );

  txChar =
  await service.getCharacteristic(
   TX_UUID
  );

  await txChar.startNotifications();

  txChar.addEventListener(
   'characteristicvaluechanged',

   e=>{

    let msg =
    new TextDecoder().decode(
     e.target.value
    );

    status.innerText=
    "Watch: "+msg;

   }

  );

  status.innerText=
  "Connected";

 }
 catch(e){

  status.innerText=
  "Error "+e;

 }

}

async function sendCmd(cmd){

 if(!rxChar) return;

 await rxChar.writeValue(

  new TextEncoder().encode(cmd)

 );

}

async function sendNote(){

 let txt=
 document.getElementById("noteText").value;

 if(txt=="") return;

 await sendCmd("NOTE "+txt);

}

</script>

</body>
</html>

</body>
</html>
